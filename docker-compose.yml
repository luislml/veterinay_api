services:
  laravel-app:
    build: .
    container_name: laravel-api
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - laravel-network
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: laravel-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - laravel-app
    networks:
      - laravel-network

  mysql:
    image: mysql:8.0
    container_name: laravel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_api
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: secret
    #    ports:
    #      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel-network
#  mailhog:
#    image: mailhog/mailhog:latest
#    container_name: laravel-mailhog
#    restart: unless-stopped
#    ports:
#      - "1025:1025"
#      - "8025:8025"
#    networks:
#      - laravel-network

volumes:
  mysql_data:


networks:
  laravel-network:
    driver: bridge
